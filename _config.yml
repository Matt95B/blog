#-------------------------------
# General Site Settings
title: Mathieu Beaugrand's Blog
logo: # You can add own logo. For example '/images/logo.png'.
description: Sharing practical insights on End User Computing (EUC) and modern workplace technologies.
baseurl: "" # The subpath of your site, e.g. /blog
url: "https://blog.beaugtech.com" # The base hostname & protocol for your site, e.g. http://example.com

#-------------------------------
# Author Settings
author:
  name: Mathieu Beaugrand
  title: Senior Solution Architect specialised in EUC technologies.
  description: The views and opinions expressed here are my own and do not necessarily reflect the official policies or positions of my current or past employers. I strive to keep all information accurate and up to date, but as with any technical content, there's always room for improvement. Feedback, suggestions, and corrections are always welcome!
  image: '/images/me_headshot.png'
  avatar: '/images/me_headshot.png'

social:
- {icon: "ion-logo-linkedin", label: LinkedIn, link: "https://www.linkedin.com/in/matt95b/"}
- {icon: "ion-logo-youtube", label: YouTube, link: "https://www.youtube.com/@beaugtech"}
- {icon: "ion-logo-github", label: GitHub, link: "https://github.com/Matt95B"}
- {icon: "ion-logo-reddit", label: Reddit, link: "https://www.reddit.com/user/Matt95B/"}

# Example of adding a new link to the author section - {icon: "ion-logo-vimeo", label: Vimeo, link: "https://vimeo.com"}
# Other icons can be found at https://ionicons.com/v4/


#-------------------------------
# Newsletter (_includes/footer-widgets/widget-subscribe.html)
mailchimp: false # To enable the mailchimp form, use the value 'true'. To disable the form, use the value 'false' or leave the field blank.
mailchimp__title: Get interesting news # Add your Title
mailchimp__text: Subscribe to our newsletter and we’ll send you the emails of latest posts. # Add your description.
mailchimp__identifier: # Add your MailChimp form identifier. For example - blogenjoyfreedom.us16.list-manage.com/subscribe/post?u=cd56155d76ddeeb4c0bc4d080&amp;id=7a526cd13e
mailchimp__button__text: Join # Add your button text


#-------------------------------
# Contact Settings
contact:
  email: info@beaugtech.com # Add your email for contact form
  description: Get in touch!. # Add a description of your form

# NOTE
# Bracia comes with a built-in contact form, that you can use with Formspree service to handle up to 50 submissions per month for free. You could also easily switch to another contact form service if you want.


#-------------------------------
# Comment Section (Disqus)
disqus-identifier:  # Add your shortname for Disqus Comment. For example anvodstudio-demo


#-------------------------------
# Google Analytics
google-analytics: # Add your identifier. For example UA-99631805-1.


#-------------------------------
# Build Settings
markdown: kramdown
permalink: /:year-:month-:day-:title
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll/tagging

paginate: 5
paginate_path: "/page/:num"

# Pages Path
defaults:
  - scope:
      path: '_pages'
    values:
      permalink: /:basename:output_ext

include:
  - _pages

# Tags
tag_page_dir:         tag
tag_page_layout:      tag_page
tag_permalink_style:  /:title

sass:
  sass_dir: _sass
  style: compressed